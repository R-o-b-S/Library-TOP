<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library TOP</title>
    <link rel="stylesheet" href="library.css">
    <script src="library.js" defer> </script>
</head>
<body>
    <div id="header">
        <div id="Library">
            <h1>Odin Library</h1>
            <p id="care">Book storage is beyond the scope of this exercise, realoading the page will erase all your submissions</p>
        </div>
        <button class="doStuff" id="addBook">
            <svg id="add" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <title>plus-circle-outline</title>
            <path d="M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M13,7H11V11H7V13H11V17H13V13H17V11H13V7Z" />
            </svg>
            New book
        </button>
    </div>
    
    <div id="main">

        <dialog action="" id="newBook">
            <form id="formCollect">
                <div>
                    <p>Fill this form to add a new book:</p>
                    <label for="addTitle">Title</label>
                    <input type="text" id="addTitle" name="title" required>
                
                    <label for="addAuthor">Author</label>
                    <input type="text" id="addAuthor" name="author" required>
                
                    <label for="addPages">Page number</label>
                    <input type="number" id="addPages" name="pages" required>
                
                    <label for="addRead">Read</label>
                    <input type="checkbox" id="addRead" name="read">
                </div>

                <div id="formButtons">
                    <button type="submit" class="doStuff" id="submitForm">Submit</button>
                    <button class="doStuff" id="cancelForm">Cancel</button>
                </div>
            </form>
            
        </dialog>

    </div>

    
    
    
</body>
</html>
